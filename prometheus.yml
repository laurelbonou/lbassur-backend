global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'lbassur-api'
    metrics_path: '/api/v1/metrics'
    static_configs:
      # Change 'host.docker.internal' to the actual machine IP or hostname if not using Docker Desktop
      - targets: ['host.docker.internal:4000']
